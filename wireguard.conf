[Interface]
# The internal IP address of the VPN server itself. 

# /24 means it can handle up to 253 'Peers' (devices).
Address = 10.0.0.1/24

# The 'Front Door' port we opened in the Oracle Cloud Security List.
ListenPort = 51820

# This stays on the server ONLY. Never share this on GitHub.

PrivateKey = <HIDDEN_FOR_SECURITY>

# --- THE NETWORKING MAGIC: NAT & ROUTING --- HAPPENS HERE

# PostUp: Commands that run when the VPN starts.
# 1. '-A FORWARD': Tells the firewall to allow traffic to pass through the server.
# 2. '-t nat -A POSTROUTING': Tells the server to 'hide' your phone's IP and 
#    replace it with the Oracle Server's Public IP (Masquerading).


PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE



# PostDown: Cleans up the rules when the VPN stops so the firewall stays tidy.
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE



[Peer]


# The Public Key from your Phone/Laptop WireGuard app.
PublicKey = <CLIENT_PUBLIC_KEY>


# /32 means this specific rule applies ONLY to this one device (10.0.0.2).
AllowedIPs = 10.0.0.2/32